apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dimp-pg
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/dimp/overlays/prod-pg
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  healthCheckExprs:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      failed: >-
        has(status.conditions) &&
        status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: >-
        has(status.conditions) &&
        status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True') &&
        has(status.readyInstances) &&
        has(spec.instances) &&
        status.readyInstances == spec.instances &&
        has(status.currentPrimary) &&
        status.currentPrimary != ''
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
