fullnameOverride: kube-prometheus-stack

grafana:
  enabled: true

  serviceMonitor:
    enabled: true
    path: "/metrics"

    labels:
      release: kube-prometheus-stack

prometheus:
  enabled: true
  prometheusSpec:
    retentionSize: 30GiB
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 50Gi

alertmanager:
  enabled: true
