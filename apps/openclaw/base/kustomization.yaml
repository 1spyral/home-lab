apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - secrets.enc.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml

configMapGenerator:
  - name: openclaw-config
    files:
      - openclaw.json
      - AGENTS.md

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app: openclaw
