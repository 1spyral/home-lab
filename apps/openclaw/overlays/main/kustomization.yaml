apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openclaw

resources:
  - namespace.yaml
  - ../../base

configMapGenerator:
  - name: openclaw-config
    behavior: replace
    files:
      - openclaw.json
      - AGENTS.md

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app: openclaw

patches:
  - path: secrets.enc.yaml

images:
  - name: ghcr.io/openclaw/openclaw
    newTag: 2026.4.15-slim
